baseURL: "https://www.hardenlab.ch/"
title: HardenLab
defaultContentLanguage: de
defaultContentLanguageInSubdir: false
enableRobotsTXT: true

module:
  imports:
    - path: github.com/imfing/hextra

languages:
  de:
    languageName: Deutsch
    weight: 1
    menu:
      main:
        - identifier: product
          name: Produkt
          pageRef: /product
          weight: 1
        - identifier: get-started
          name: Get Started
          pageRef: /get-started
          weight: 2
        - identifier: buy
          name: Kaufen
          pageRef: /buy
          weight: 3
        - identifier: faq
          name: FAQ
          pageRef: /faq
          weight: 4
        - identifier: about
          name: About
          pageRef: /about
          weight: 5
        - identifier: language
          name: Sprache
          weight: 98
          params:
            type: language-switch
            label: true
            icon: globe-alt
        - identifier: theme
          name: Theme
          weight: 99
          params:
            type: theme-toggle
            label: false

  en:
    languageName: English
    weight: 2
    menu:
      main:
        - identifier: product
          name: Product
          pageRef: /product
          weight: 1
        - identifier: get-started
          name: Get Started
          pageRef: /get-started
          weight: 2
        - identifier: buy
          name: Buy
          pageRef: /buy
          weight: 3
        - identifier: faq
          name: FAQ
          pageRef: /faq
          weight: 4
        - identifier: about
          name: About
          pageRef: /about
          weight: 5
        - identifier: language
          name: Language
          weight: 98
          params:
            type: language-switch
            label: true
            icon: globe-alt
        - identifier: theme
          name: Theme
          weight: 99
          params:
            type: theme-toggle
            label: false


params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: icon.svg
      dark: icon.svg
      link: /
      width: 34
      height: 34
  page:
    width: normal
  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false
  theme:
    default: dark
    displayToggle: true