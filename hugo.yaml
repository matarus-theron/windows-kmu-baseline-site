# Hugo configuration file
baseURL: "https://www.hardenlab.ch/"
title: HardenLab
languageCode: de-CH
defaultContentLanguage: de
defaultContentLanguageInSubdir: true
enableRobotsTXT: true

languages:
  de:
    languageName: Deutsch
    languageCode: de-DE
    weight: 1
    menu:
      main:
        - identifier: docs
          name: Dokumentation
          pageRef: /docs
          weight: 1
        - identifier: product
          name: Produkt
          pageRef: /product
          weight: 2
        - identifier: buy
          name: Kaufen
          pageRef: /buy
          weight: 3
        - identifier: faq
          name: FAQ
          pageRef: /docs/faq
          weight: 4
        - identifier: legal
          name: Rechtliches
          pageRef: /legal
          weight: 5
        - identifier: about
          name: Über das Projekt
          pageRef: /about
          weight: 6
        - identifier: search
          name: Suche
          weight: 7
          params:
            type: search
        - identifier: language
          name: Sprache
          weight: 8
          params:
            type: language-switch
            label: false
            icon: globe-alt
        - identifier: theme
          name: Theme
          weight: 9
          params:
            type: theme-toggle
            label: false
  en:
    languageName: English
    languageCode: en-US
    weight: 2
    menu:
      main:
        - identifier: docs
          name: Documentation
          pageRef: /docs
          weight: 1
        - identifier: product
          name: Product
          pageRef: /product
          weight: 2
        - identifier: buy
          name: Buy
          pageRef: /buy
          weight: 3
        - identifier: faq
          name: FAQ
          pageRef: /docs/faq
          weight: 4
        - identifier: legal
          name: Legal
          pageRef: /legal
          weight: 5
        - identifier: about
          name: About the Project
          pageRef: /about
          weight: 6
        - identifier: search
          name: Search
          weight: 7
          params:
            type: search
        - identifier: language
          name: Language
          weight: 8
          params:
            type: language-switch
            label: false
            icon: globe-alt
        - identifier: theme
          name: Theme
          weight: 9
          params:
            type: theme-toggle
            label: false

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: favicon.svg
      dark: favicon-dark.svg
      link: /
      width: 34
      height: 34

  footer:
    displayCopyright: true
    displayPoweredBy: false

  images:
    - "/images/og-default.png"

  theme:
    default: system
    displayToggle: true

  editURL:
    enable: false
