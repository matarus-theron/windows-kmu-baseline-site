# Hugo configuration file
title: Windows KMU Basline
languageCode: de-CH
defaultContentLanguage: de
defaultContentLanguageInSubdir: true
enableRobotsTXT: true

languages:
  de:
    languageName: Deutsch
    weight: 1
  en:
    languageName: English
    weight: 2

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - identifier: docs
      name: Docs
      pageRef: /docs
      weight: 1
    - identifier: product
      name: Product
      pageRef: /product
      weight: 2
    - identifier: pricing
      name: Pricing
      pageRef: /pricing
      weight: 3
    - identifier: buy
      name: Buy
      pageRef: /buy
      weight: 4
    - identifier: faq
      name: FAQ
      pageRef: /docs/faq
      weight: 5
    - identifier: legal
      name: Legal
      pageRef: /legal
      weight: 6
    - identifier: about
      name: About
      pageRef: /about
      weight: 7
    - identifier: search
      name: Search
      weight: 8
      params:
        type: search
    - identifier: github
      name: GitHub
      weight: 9
      url: "https://github.com/matarus-theron/windows-kmu-baseline-pack"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: false
    base: "https://matarus-theron.github.io/windows-kmu-baseline-site/"
