baseURL: "https://www.hardenlab.ch/"
title: HardenLab
defaultContentLanguage: de
defaultContentLanguageInSubdir: false
enableRobotsTXT: true

module:
  imports:
    - path: github.com/imfing/hextra

languages:
  de:
    languageName: Deutsch
    weight: 1
    menu:
      main:
        - identifier: product
          name: Produkt
          pageRef: /product
          weight: 1
        - identifier: get-started
          name: Get Started
          pageRef: /get-started
          weight: 2
        - identifier: buy
          name: Kaufen
          pageRef: /buy
          weight: 3
        - identifier: faq
          name: FAQ
          pageRef: /faq
          weight: 4
  en:
    languageName: English
    weight: 2
    menu:
      main:
        - identifier: product
          name: Product
          pageRef: /product
          weight: 1
        - identifier: get-started
          name: Get Started
          pageRef: /get-started
          weight: 2
        - identifier: buy
          name: Buy
          pageRef: /buy
          weight: 3
        - identifier: faq
          name: FAQ
          pageRef: /faq
          weight: 4

params:
  navbar:
    displayTitle: true
    displayLogo: false
  page:
    width: normal
  footer:
    displayCopyright: true
    displayPoweredBy: false
  theme:
    default: dark
    displayToggle: true
